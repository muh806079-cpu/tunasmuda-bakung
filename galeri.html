<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri - KARANG TARUNA TUNAS MUDA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f8f9fa}
nav{background:#D32F2F; padding:10px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:999}
nav .logo{display:flex; align-items:center; gap:10px; color:white; font-weight:bold; font-size:16px}
nav .logo img{width:40px; height:40px; border-radius:50%; background:white; padding:3px; object-fit:cover}
nav .menu a{color:white; margin:0 8px; text-decoration:none; font-weight:bold; font-size:14px}
nav .menu a:hover{border-bottom:2px solid white}
h2{color:#D32F2F;text-align:center;margin:20px 0}
.grid-galeri{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.kartu-galeri{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.kartu-galeri img{width:100%;height:200px;object-fit:cover}
.kartu-galeri .caption{padding:12px}
.kartu-galeri .caption h4{color:#D32F2F;margin-bottom:5px}
.kartu-galeri .caption p{font-size:14px;color:#555}
.video-box{padding:20px}
.video-box iframe{width:100%;height:300px;border:none;border-radius:12px}
@media(max-width:600px){nav .menu a{font-size:12px; margin:0 4px} .video-box iframe{height:200px}}
</style>
</head>
<body>
<nav>
  <div class="logo"><img src="logo.jpg" alt="Logo"><span>TUNAS MUDA</span></div>
  <div class="menu">
    <a href="index.html">Beranda</a><a href="struktur.html">Struktur</a><a href="kegiatan.html">Kegiatan</a><a href="galeri.html">Galeri</a><a href="berita.html">Pengumuman</a>
  </div>
</nav>

</div>

</html>
